services:
  user-management-service:
    build:
      context: ./services/user-management-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      UMS_DB_URL: jdbc:mysql://ums-db:3306/microtwitter_ums
