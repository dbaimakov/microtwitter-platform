apiVersion: v1
kind: Secret
metadata:
  name: messages-mysql-secret
  namespace: microtwitter
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root123
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: messages-mysql-pvc
  namespace: microtwitter
spec:
  storageClassName: microk8s-hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: messages-mysql
  namespace: microtwitter
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: messages-mysql
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages-mysql
  namespace: microtwitter
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: messages-mysql
  template:
    metadata:
      labels:
        app: messages-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messages-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: microtwitter_messages
          volumeMounts:
            - name: messages-mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: messages-mysql-storage
          persistentVolumeClaim:
            claimName: messages-mysql-pvc
