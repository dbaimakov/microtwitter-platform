spring:
  application:
    name: subscription-service
  datasource:
    url: jdbc:mysql://127.0.0.1:33062/microtwitter_subscriptions
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8082

clients:
  ums:
    base-url: http://localhost:8081
