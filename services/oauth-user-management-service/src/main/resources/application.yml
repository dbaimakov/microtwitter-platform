spring:
  application:
    name: user-management-service
  datasource:
    url: ${UMS_DB_URL:jdbc:mysql://127.0.0.1:33061/microtwitter_ums}
    username: ${UMS_DB_USERNAME:root}
    password: ${UMS_DB_PASSWORD:root123}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:replace-with-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:replace-with-github-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email
        provider:
          github:
            user-name-attribute: login

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    session:
      ttl-minutes: 15
    oauth:
      default-roles:
        - PRODUCER
        - SUBSCRIBER
    jwt:
      issuer: user-management-service
      secret: ${JWT_SECRET:change-this-jwt-secret-to-a-long-random-value-for-production-use-1234567890}
